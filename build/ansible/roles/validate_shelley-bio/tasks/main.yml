---
- name: Check launcher script exists
  stat:
    path: /usr/local/bin/shelley-bio
  register: shelley_bin
  failed_when: not shelley_bin.stat.exists

- name: Check launcher is executable
  stat:
    path: /usr/local/bin/shelley-bio
  register: shelley_exec
  failed_when: not shelley_exec.stat.executable

- name: Run shelley-bio CLI test
  command: shelley-bio search "quality control"
  changed_when: false
  register: shelley_test
  failed_when: false

- name: Report CLI test result
  debug:
    msg: "{{ 'OK' if shelley_test.rc == 0 else 'WARNING: shelley-bio search CLI test failed' }}"

- name: Check MOTD exists
  stat:
    path: /etc/motd.d/bioshell
  register: motd_file

- name: Assert MOTD exists
  assert:
    that:
      - motd_file.stat is defined
      - motd_file.stat.exists

- name: Check MOTD contains BioShell marker
  command: grep -q "BioShell" /etc/motd.d/bioshell
  changed_when: false
