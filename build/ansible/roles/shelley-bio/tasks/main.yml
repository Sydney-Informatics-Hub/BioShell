---
- name: Ensure Python 3 and pip are installed
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: yes

- name: Ensure Git is installed
  apt:
    name: git
    state: present


- name: Create installation directory
  file:
    path: /opt/shelley-bio
    state: directory
    owner: root
    group: root
    mode: '0755'
    recurse: yes

- name: Clone Shelley Bio repository
  git:
    repo: https://github.com/Sydney-Informatics-Hub/shelley-bio.git
    dest: /opt/shelley-bio
    version: main
    force: yes
    depth: 1

- name: Create Shelley Bio virtual environment
  command: python3 -m venv /opt/shelley-bio-env
  args:
    creates: /opt/shelley-bio-env/bin/activate
  
- name: Upgrade pip setuptools and wheel in venv
  pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: /opt/shelley-bio-env

- name: Install Shelley Bio dependencies into venv
  pip:
    requirements: /opt/shelley-bio/requirements.txt
    state: present
    virtualenv: /opt/shelley-bio-env

- name: Install Shelley Bio package into venv
  pip:
    name: /opt/shelley-bio
    editable: yes
    state: present
    virtualenv: /opt/shelley-bio-env

- name: Fix shelley-bio entry point to use asyncio.run
  copy:
    dest: /opt/shelley-bio-env/bin/shelley-bio
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/opt/shelley-bio-env/bin/python3
      import sys
      from shelley_bio.client.cli import main
      if __name__ == "__main__":
          sys.argv[0] = sys.argv[0].removesuffix(".exe")
          sys.exit(main())

- name: Find toolfinder_meta.yaml in source
  command: find /opt/shelley-bio -name "toolfinder_meta.yaml"
  register: yaml_find
  changed_when: false

- name: Find galaxy_singularity_cache.json.gz in source
  command: find /opt/shelley-bio -name "galaxy_singularity_cache.json.gz"
  register: cache_find
  changed_when: false

- name: Symlink toolfinder_meta.yaml to venv site-packages
  file:
    src: "{{ yaml_find.stdout }}"
    dest: /opt/shelley-bio-env/lib/python3.12/site-packages/toolfinder_meta.yaml
    state: link
    force: yes

- name: Symlink galaxy_singularity_cache.json.gz to venv site-packages
  file:
    src: "{{ cache_find.stdout }}"
    dest: /opt/shelley-bio-env/lib/python3.12/site-packages/galaxy_singularity_cache.json.gz
    state: link
    force: yes

- name: Add shelley-bio venv to system PATH
  lineinfile:
    path: /etc/environment
    regexp: '^PATH='
    line: 'PATH="{{ updated_path }}"'
    state: present
  vars:
    current_path: "{{ ansible_env.PATH }}"
    updated_path: "/opt/shelley-bio-env/bin:{{ current_path }}"

- name: Remove redundant wrapper script
  file:
    path: /usr/local/bin/shelley-bio
    state: absent

- name: Create system-wide launcher script
  copy:
    dest: /usr/local/bin/shelley-bio
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      exec /opt/shelley-bio-env/bin/shelley-bio "$@"
